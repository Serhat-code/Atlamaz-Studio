<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fond noir -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Bordure subtile -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Grille décorative -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Badge disponible -->
  <rect x="476" y="180" width="248" height="32" rx="16" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <circle cx="496" cy="196" r="4" fill="#4ade80"/>
  <text x="510" y="201" font-family="'Inter','Arial',sans-serif" font-size="13" font-weight="500" fill="#4ade80" letter-spacing="0.02em">Disponible pour projets</text>

  <!-- Nom du studio -->
  <text x="600" y="290" font-family="'Inter','Arial',sans-serif" font-size="64" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="0.08em">ATLAMAZ STUDIO</text>

  <!-- Sous-titre -->
  <text x="600" y="345" font-family="'Inter','Arial',sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.45)" text-anchor="middle">Studio de création web · Lyon</text>

  <!-- Séparateur -->
  <line x1="480" y1="380" x2="720" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- URL -->
  <text x="600" y="415" font-family="'Inter','Arial',sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="0.05em">atlamazstudio.fr</text>
</svg>
