<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- Polices auto-hébergées — preload pour éviter le blocage du rendu -->
    <link rel="preload" href="/fonts/fraunces-roman.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />

    <!-- SEO de base (surchargé par react-helmet-async sur chaque page) -->
    <title>Atlamaz Studio — Création de sites web à Lyon</title>
    <meta
      name="description"
      content="Studio de création web à Lyon. Sites vitrines, landing pages, boutiques en ligne, applications mobiles. Livraison rapide, prix clairs, résultats garantis."
    />
    <link rel="canonical" href="https://atlamaz-studio.fr" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://atlamaz-studio.fr" />
    <meta property="og:title"       content="Atlamaz Studio — Création de sites web à Lyon" />
    <meta property="og:description" content="Studio de création web freelance à Lyon. Sites vitrines, landing pages, boutiques en ligne et applications mobiles. Devis gratuit sous 24h." />
    <meta property="og:image"       content="https://atlamaz-studio.fr/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="fr_FR" />
    <meta property="og:site_name"   content="Atlamaz Studio" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Atlamaz Studio — Création de sites web à Lyon" />
    <meta name="twitter:description" content="Studio de création web à Lyon. Sites vitrines, landing pages, boutiques en ligne, applications mobiles." />
    <meta name="twitter:image"       content="https://atlamaz-studio.fr/og-image.png" />

    <!-- Schema.org — LocalBusiness (SEO local Lyon) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Atlamaz Studio",
      "description": "Studio de création web freelance à Lyon — sites vitrines, landing pages, boutiques en ligne, applications mobiles React Native.",
      "url": "https://atlamaz-studio.fr",
      "email": "atlamazstudio@gmail.com",
      "image": "https://atlamaz-studio.fr/og-image.png",
      "priceRange": "€€",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lyon",
        "addressRegion": "Rhône",
        "addressCountry": "FR"
      },
      "areaServed": [
        { "@type": "City", "name": "Lyon" },
        { "@type": "Country", "name": "France" }
      ],
      "knowsAbout": ["Création de site web", "React", "SEO", "Application mobile", "React Native"],
      "sameAs": [
        "https://www.linkedin.com/company/atlamaz-studio"
      ]
    }
    </script>

    <!-- Umami Analytics — chargé dynamiquement par CookieBanner.jsx après consentement -->
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
